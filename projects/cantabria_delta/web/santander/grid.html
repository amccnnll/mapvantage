<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Santander Grid | MapVantage</title>
	<style>
		:root {
			--paper: #ffffff;
			--ink: #0f172a;
			--muted: #64748b;
			--accent: #2563eb;
			--accent-soft: #dbeafe;
			--card: rgba(255, 255, 255, 0.97);
			--shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
			color: var(--ink);
			background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
			min-height: 100vh;
		}
		a { color: var(--accent); text-decoration: none; }
		a:hover { text-decoration: underline; }
		.shell {
			width: min(1180px, calc(100vw - 32px));
			margin: 0 auto;
			padding: 32px 0 48px;
		}
		.topbar {
			display: flex;
			justify-content: space-between;
			gap: 16px;
			align-items: center;
			margin-bottom: 24px;
			flex-wrap: wrap;
		}
		.crumb {
			font-size: 0.875rem;
			font-weight: 500;
			color: var(--muted);
			text-decoration: none;
		}
		.crumb:hover { color: var(--accent); }
		.hero, .panel, .card {
			background: var(--card);
			border: 1px solid rgba(15, 23, 42, 0.06);
			box-shadow: var(--shadow);
			border-radius: 12px;
		}
		.hero { padding: 28px; margin-bottom: 24px; }
		h1, h2, h3 { margin: 0 0 12px; color: var(--ink); }
		h1 { font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; font-weight: 700; }
		h2 { font-size: 1.5rem; font-weight: 600; }
		h3 { font-size: 1.125rem; font-weight: 600; }
		p { margin: 0; color: var(--muted); line-height: 1.6; }
		.meta {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 16px;
		}
		.meta span {
			padding: 6px 12px;
			border-radius: 6px;
			background: var(--accent-soft);
			color: var(--accent);
			font-size: 0.875rem;
			font-weight: 500;
		}
		.panel { padding: 20px; }
		.button-row {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 20px;
		}
		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 10px 18px;
			border-radius: 8px;
			background: var(--accent);
			color: white;
			text-decoration: none;
			border: 0;
			cursor: pointer;
			font: inherit;
			font-weight: 500;
			transition: background 200ms;
		}
		.button:hover { background: #1d4ed8; }
		.button.secondary {
			background: transparent;
			color: var(--ink);
			border: 1px solid rgba(15, 23, 42, 0.1);
		}
		.button.secondary:hover { background: #f1f5f9; }
		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
			gap: 18px;
		}
		.card { overflow: hidden; transition: box-shadow 200ms; }
		.card:hover { box-shadow: 0 15px 40px rgba(15, 23, 42, 0.12); }
		.card-body { padding: 18px; }
		.card img {
			width: 100%;
			display: block;
			aspect-ratio: 4 / 3;
			object-fit: cover;
			background: #f1f5f9;
		}
		.viewer {
			position: relative;
			border-radius: 12px;
			overflow: hidden;
			background: #f1f5f9;
			aspect-ratio: 4 / 3;
		}
		.viewer img {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
		}
		.controls {
			display: grid;
			gap: 14px;
			margin-top: 18px;
		}
		.controls label {
			display: grid;
			gap: 8px;
			font-weight: 600;
			color: var(--ink);
		}
		.controls input[type=range] { width: 100%; cursor: pointer; }
		.caption {
			margin-top: 12px;
			font-size: 0.95rem;
			color: var(--muted);
		}
		@media (max-width: 760px) {
			.shell { width: min(100vw - 20px, 1180px); padding-top: 20px; }
			.hero, .panel { padding: 18px; }
		}
		</style>
</head>
<body>
	<div class="shell">
		<div class="topbar">
			<a class="crumb" href="index.html">Back to Site</a>
			<a class="crumb" href="../../../index.html">GitHub Pages Home</a>
		</div>
		<section class="hero">
			<h1>Santander Grid View</h1>
			<p>All fetched years side by side for quick visual scanning.</p>
		</section>
		<section class="grid">
						<article class="card">
							<img src="../../data/images/cantabria-delta-santander__1956__ortofoto-56-57__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png" alt="1956">
							<div class="card-body">
								<h3>1956</h3>
								<p>ortofoto-56-57</p>
							</div>
						</article>
						
						<article class="card">
							<img src="../../data/images/cantabria-delta-santander__1980__ortofoto-80-90__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png" alt="1980">
							<div class="card-body">
								<h3>1980</h3>
								<p>ortofoto-80-90</p>
							</div>
						</article>
						
						<article class="card">
							<img src="../../data/images/cantabria-delta-santander__2000__ortofoto-2001__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png" alt="2000">
							<div class="card-body">
								<h3>2000</h3>
								<p>ortofoto-2001</p>
							</div>
						</article>
						
						<article class="card">
							<img src="../../data/images/cantabria-delta-santander__2024__ortofoto-2024__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png" alt="2024">
							<div class="card-body">
								<h3>2024</h3>
								<p>ortofoto-2024</p>
							</div>
						</article>
						</section>
	</div>
</body>
</html>
