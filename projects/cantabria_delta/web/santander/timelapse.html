<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Santander Timelapse | MapVantage</title>
	<style>
		:root {
			--paper: #f3efe4;
			--ink: #172126;
			--muted: #5f6b6d;
			--accent: #0f7c82;
			--accent-soft: #d9eeeb;
			--card: rgba(255, 252, 245, 0.88);
			--shadow: 0 18px 40px rgba(23, 33, 38, 0.12);
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
			color: var(--ink);
			background:
				radial-gradient(circle at top left, rgba(15, 124, 130, 0.14), transparent 35%),
				radial-gradient(circle at bottom right, rgba(195, 157, 92, 0.18), transparent 30%),
				linear-gradient(180deg, #f7f3e9 0%, #efe9dd 100%);
			min-height: 100vh;
		}
		a { color: var(--accent); }
		.shell {
			width: min(1180px, calc(100vw - 32px));
			margin: 0 auto;
			padding: 32px 0 48px;
		}
		.topbar {
			display: flex;
			justify-content: space-between;
			gap: 16px;
			align-items: center;
			margin-bottom: 24px;
			flex-wrap: wrap;
		}
		.crumb {
			font-size: 0.9rem;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--muted);
			text-decoration: none;
		}
		.hero, .panel, .card {
			background: var(--card);
			border: 1px solid rgba(23, 33, 38, 0.08);
			box-shadow: var(--shadow);
			border-radius: 24px;
			backdrop-filter: blur(8px);
		}
		.hero { padding: 28px; margin-bottom: 24px; }
		h1, h2, h3 { margin: 0 0 12px; }
		h1 { font-size: clamp(2rem, 4vw, 3.5rem); line-height: 0.95; }
		p { margin: 0; color: var(--muted); line-height: 1.6; }
		.meta {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 16px;
		}
		.meta span {
			padding: 8px 12px;
			border-radius: 999px;
			background: var(--accent-soft);
			color: var(--ink);
			font-size: 0.92rem;
		}
		.panel { padding: 20px; }
		.button-row {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 20px;
		}
		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 12px 16px;
			border-radius: 999px;
			background: var(--ink);
			color: white;
			text-decoration: none;
			border: 0;
			cursor: pointer;
			font: inherit;
		}
		.button.secondary {
			background: transparent;
			color: var(--ink);
			border: 1px solid rgba(23, 33, 38, 0.15);
		}
		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
			gap: 18px;
		}
		.card { overflow: hidden; }
		.card-body { padding: 18px; }
		.card img {
			width: 100%;
			display: block;
			aspect-ratio: 4 / 3;
			object-fit: cover;
			background: #d6d0c4;
		}
		.viewer {
			position: relative;
			border-radius: 20px;
			overflow: hidden;
			background: #d6d0c4;
			aspect-ratio: 4 / 3;
		}
		.viewer img {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
		}
		.controls {
			display: grid;
			gap: 14px;
			margin-top: 18px;
		}
		.controls label {
			display: grid;
			gap: 8px;
			font-weight: 600;
		}
		.controls input[type=range] { width: 100%; }
		.caption {
			margin-top: 12px;
			font-size: 0.95rem;
			color: var(--muted);
		}
		@media (max-width: 760px) {
			.shell { width: min(100vw - 20px, 1180px); padding-top: 20px; }
			.hero, .panel { padding: 18px; }
		}
		</style>
</head>
<body>
	<div class="shell">
		<div class="topbar">
			<a class="crumb" href="index.html">Back to Site</a>
			<a class="crumb" href="../../../index.html">GitHub Pages Home</a>
		</div>
		<section class="hero">
			<h1>Santander Timelapse</h1>
			<p>Play through the fetched years in sequence.</p>
		</section>
		<section class="panel">
			<div class="viewer">
				<img id="frame" src="../../data/images/cantabria-delta-santander__1956__ortofoto-56-57__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png" alt="Timelapse frame">
			</div>
			<div class="controls">
				<label>Year
					<input id="frame-range" type="range" min="0" max="3" value="0">
				</label>
			</div>
			<div class="button-row">
				<button id="play" class="button" type="button">Play</button>
				<button id="pause" class="button secondary" type="button">Pause</button>
			</div>
			<div class="caption" id="caption"></div>
		</section>
	</div>
	<script>
		const records = [{"year": 1956, "service": "ortofoto-56-57", "path": "../../data/images/cantabria-delta-santander__1956__ortofoto-56-57__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png", "filename": "cantabria-delta-santander__1956__ortofoto-56-57__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png"}, {"year": 1980, "service": "ortofoto-80-90", "path": "../../data/images/cantabria-delta-santander__1980__ortofoto-80-90__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png", "filename": "cantabria-delta-santander__1980__ortofoto-80-90__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png"}, {"year": 2000, "service": "ortofoto-2001", "path": "../../data/images/cantabria-delta-santander__2000__ortofoto-2001__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png", "filename": "cantabria-delta-santander__2000__ortofoto-2001__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png"}, {"year": 2024, "service": "ortofoto-2024", "path": "../../data/images/cantabria-delta-santander__2024__ortofoto-2024__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png", "filename": "cantabria-delta-santander__2024__ortofoto-2024__layer0__epsg-25830__santander__438207-351-4808859-947-441318-857-4811288-285__1600x1200.png"}];
		const frame = document.getElementById('frame');
		const range = document.getElementById('frame-range');
		const caption = document.getElementById('caption');
		let timer = null;
		function render() {
			const item = records[Number(range.value)];
			frame.src = item.path;
			caption.textContent = `${item.year} — ${item.service}`;
		}
		function start() {
			if (timer !== null) return;
			timer = window.setInterval(() => {
				range.value = (Number(range.value) + 1) % records.length;
				render();
			}, 1200);
		}
		function stop() {
			if (timer !== null) {
				window.clearInterval(timer);
				timer = null;
			}
		}
		range.addEventListener('input', render);
		document.getElementById('play').addEventListener('click', start);
		document.getElementById('pause').addEventListener('click', stop);
		render();
	</script>
</body>
</html>
