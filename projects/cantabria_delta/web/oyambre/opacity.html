<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Oyambre Opacity | MapVantage</title>
	<style>
		
		:root {
			--paper: #f3efe4;
			--ink: #172126;
			--muted: #5f6b6d;
			--accent: #0f7c82;
			--accent-soft: #d9eeeb;
			--card: rgba(255, 252, 245, 0.88);
			--shadow: 0 18px 40px rgba(23, 33, 38, 0.12);
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
			color: var(--ink);
			background:
				radial-gradient(circle at top left, rgba(15, 124, 130, 0.14), transparent 35%),
				radial-gradient(circle at bottom right, rgba(195, 157, 92, 0.18), transparent 30%),
				linear-gradient(180deg, #f7f3e9 0%, #efe9dd 100%);
			min-height: 100vh;
		}
		a { color: var(--accent); }
		.shell {
			width: min(1180px, calc(100vw - 32px));
			margin: 0 auto;
			padding: 32px 0 48px;
		}
		.topbar {
			display: flex;
			justify-content: space-between;
			gap: 16px;
			align-items: center;
			margin-bottom: 24px;
			flex-wrap: wrap;
		}
		.crumb {
			font-size: 0.9rem;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--muted);
			text-decoration: none;
		}
		.hero, .panel, .card {
			background: var(--card);
			border: 1px solid rgba(23, 33, 38, 0.08);
			box-shadow: var(--shadow);
			border-radius: 24px;
			backdrop-filter: blur(8px);
		}
		.hero { padding: 28px; margin-bottom: 24px; }
		h1, h2, h3 { margin: 0 0 12px; }
		h1 { font-size: clamp(2rem, 4vw, 3.5rem); line-height: 0.95; }
		p { margin: 0; color: var(--muted); line-height: 1.6; }
		.meta {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 16px;
		}
		.meta span {
			padding: 8px 12px;
			border-radius: 999px;
			background: var(--accent-soft);
			color: var(--ink);
			font-size: 0.92rem;
		}
		.panel { padding: 20px; }
		.button-row {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 20px;
		}
		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 12px 16px;
			border-radius: 999px;
			background: var(--ink);
			color: white;
			text-decoration: none;
			border: 0;
			cursor: pointer;
			font: inherit;
		}
		.button.secondary {
			background: transparent;
			color: var(--ink);
			border: 1px solid rgba(23, 33, 38, 0.15);
		}
		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
			gap: 18px;
		}
		.card { overflow: hidden; }
		.card-body { padding: 18px; }
		.card img {
			width: 100%;
			display: block;
			aspect-ratio: 4 / 3;
			object-fit: cover;
			background: #d6d0c4;
		}
		.viewer {
			position: relative;
			border-radius: 20px;
			overflow: hidden;
			background: #d6d0c4;
			aspect-ratio: 4 / 3;
		}
		.viewer img {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
		}
		.controls {
			display: grid;
			gap: 14px;
			margin-top: 18px;
		}
		.controls label {
			display: grid;
			gap: 8px;
			font-weight: 600;
		}
		.controls input[type=range] { width: 100%; }
		.caption {
			margin-top: 12px;
			font-size: 0.95rem;
			color: var(--muted);
		}
		@media (max-width: 760px) {
			.shell { width: min(100vw - 20px, 1180px); padding-top: 20px; }
			.hero, .panel { padding: 18px; }
		}
		
		.stack img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
	</style>
</head>
<body>
	<div class="shell">
		<div class="topbar">
			<a class="crumb" href="index.html">Back to Site</a>
			<a class="crumb" href="../../../index.html">GitHub Pages Home</a>
		</div>
		<section class="hero">
			<h1>Oyambre Opacity Blend</h1>
			<p>Blend the earliest and latest imagery to inspect alignment and broad habitat change.</p>
			<div class="meta">
				<span>Base: 1956</span>
				<span>Overlay: 2024</span>
			</div>
		</section>
		<section class="panel">
			<div class="viewer stack">
				<img src="../../data/images/cantabria-delta-oyambre__1956__ortofoto-56-57__layer0__epsg-25830__oyambre__391468-764-4802445-188-394216-075-4804825-562__1600x1200.png" alt="1956">
				<img id="overlay" src="../../data/images/cantabria-delta-oyambre__2024__ortofoto-2024__layer0__epsg-25830__oyambre__391468-764-4802445-188-394216-075-4804825-562__1600x1200.png" alt="2024" style="opacity:0.5">
			</div>
			<div class="controls">
				<label>Overlay opacity
					<input id="opacity" type="range" min="0" max="100" value="50">
				</label>
			</div>
			<div class="caption">Slide to change how strongly the 2024 layer sits on top of 1956.</div>
		</section>
	</div>
	<script>
		const opacity = document.getElementById('opacity');
		const overlay = document.getElementById('overlay');
		function render() { overlay.style.opacity = opacity.value / 100; }
		opacity.addEventListener('input', render);
		render();
	</script>
</body>
</html>
